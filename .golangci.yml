run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable-all: true
  disable:
    # Too strict for this project
    - depguard
    - ireturn
    - varnamelen
    - wrapcheck
    - exhaustruct
    - gochecknoglobals
    - mnd
    - gci
    - paralleltest
    - tenv

linters-settings:
  gocyclo:
    min-complexity: 15
  govet:
    enable-all: true
    disable:
      - fieldalignment
  revive:
    rules:
      - name: unexported-return
        disabled: true
  funlen:
    lines: 100
    statements: 50
  lll:
    line-length: 140
  goimports:
    local-prefixes: github.com/mpdroog/mycal
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
      - opinionated
    disabled-checks:
      - exitAfterDefer
      - unnamedResult
  errcheck:
    check-type-assertions: true
    check-blank: true
  gosec:
    severity: medium
    confidence: medium
  stylecheck:
    checks: ["all"]
  tagliatelle:
    case:
      rules:
        json: snake

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - funlen
        - err113
  max-issues-per-linter: 0
  max-same-issues: 0
