run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable-all: true
  disable:
    # Too strict for this project
    - depguard
    - ireturn
    - varnamelen
    - wrapcheck
    - exhaustruct
    - gochecknoglobals
    - mnd
    - gci
    - paralleltest
    - tenv
    - dupl         # Detects structural similarity, not actual duplication
    - goconst      # Not useful for this project size
    - godot        # Comment style nitpicking
    - wsl          # Whitespace linter - too strict
    - nlreturn     # Blank line before return - too strict
    - gofumpt      # Formatter differences
    - testpackage  # Handled in exclude-rules

linters-settings:
  gocyclo:
    min-complexity: 25
  cyclop:
    max-complexity: 25
  gocognit:
    min-complexity: 40
  govet:
    enable-all: true
    disable:
      - fieldalignment
  revive:
    rules:
      - name: unexported-return
        disabled: true
  funlen:
    lines: 150
    statements: 80
  lll:
    line-length: 180
  goimports:
    local-prefixes: github.com/mpdroog/mycal
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
      - opinionated
    disabled-checks:
      - exitAfterDefer
      - unnamedResult
  errcheck:
    check-type-assertions: true
    check-blank: true
  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G202  # SQL concatenation is safe when using placeholders
  stylecheck:
    checks: ["all"]
  tagliatelle:
    case:
      rules:
        json: snake

issues:
  exclude-dirs:
    - node_modules
  exclude-rules:
    - path: _test\.go
      linters:
        - funlen
        - err113
        - errcheck
        - lll
        - wsl
        - gocyclo
        - cyclop
        - gocognit
  max-issues-per-linter: 0
  max-same-issues: 0
