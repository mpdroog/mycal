{{define "content"}}
<div class="mb-3 d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Users</h5>
    <a href="/admin/users/new" class="btn btn-accent btn-sm">Add User</a>
</div>

<div class="card">
    <div class="card-body p-0">
        {{if .Users}}
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Created</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                {{range .Users}}
                <tr>
                    <td>{{.Username}}</td>
                    <td>{{if .IsAdmin}}<span class="badge bg-accent">Admin</span>{{else}}<span class="badge bg-secondary">User</span>{{end}}</td>
                    <td>{{.CreatedAt.Format "Jan 2, 2006"}}</td>
                    <td class="text-end">
                        <a href="/admin/users/{{.ID}}/edit" class="btn btn-outline-secondary btn-sm">Edit</a>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
        {{else}}
        <p class="text-secondary mb-0 p-3">No users found.</p>
        {{end}}
    </div>
</div>
{{end}}
