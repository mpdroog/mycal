{{template "base" .}}

{{define "content"}}
<div class="page-header">
    <h2>{{.Title}}</h2>
</div>

<div class="card">
    <form method="POST" class="entry-form">
        <div class="form-group">
            <label for="food_id">Food</label>
            <select name="food_id" id="food_id" required class="form-control">
                {{range .Foods}}
                <option value="{{.ID}}" {{if eq .ID $.Entry.FoodID}}selected{{end}}>{{.Name}} ({{.Calories}} cal)</option>
                {{end}}
            </select>
        </div>

        <div class="form-group">
            <label for="meal">Meal</label>
            <select name="meal" id="meal" class="form-control">
                {{range .Meals}}
                <option value="{{.}}" {{if eq . $.Entry.Meal}}selected{{end}}>{{. | title}}</option>
                {{end}}
            </select>
        </div>

        <div class="form-group">
            <label for="servings">Servings</label>
            <input type="number" id="servings" name="servings" value="{{printf "%.2g" .Entry.Servings}}" step="0.25" min="0.25" class="form-control">
        </div>

        <div class="form-group">
            <label for="notes">Notes (optional)</label>
            <input type="text" id="notes" name="notes" value="{{.Entry.Notes}}" class="form-control" placeholder="Any notes...">
        </div>

        <div class="form-actions">
            <a href="/?date={{.Entry.Date}}" class="btn">Cancel</a>
            <button type="submit" class="btn btn-primary">Save</button>
        </div>
    </form>
</div>
{{end}}
