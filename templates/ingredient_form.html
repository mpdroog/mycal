{{template "base" .}}

{{define "content"}}
<div class="mb-3">
    <h5>{{.Title}}</h5>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" id="name" name="name" value="{{.Ingredient.Name}}" required class="form-control" placeholder="e.g., Chicken Breast">
            </div>

            <div class="mb-3">
                <label class="form-label">Serving Type</label>
                <div class="d-flex gap-3">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="serving_type" id="serving_type_weight" value="weight" {{if or (eq .Ingredient.ServingType "") (eq .Ingredient.ServingType "weight")}}checked{{end}} onchange="toggleUnitField()">
                        <label class="form-check-label" for="serving_type_weight">Per 100g</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="serving_type" id="serving_type_unit" value="unit" {{if eq .Ingredient.ServingType "unit"}}checked{{end}} onchange="toggleUnitField()">
                        <label class="form-check-label" for="serving_type_unit">Per unit</label>
                    </div>
                </div>
            </div>

            <div class="mb-3" id="unit_name_field" style="{{if or (eq .Ingredient.ServingType "") (eq .Ingredient.ServingType "weight")}}display:none{{end}}">
                <label for="serving_size" class="form-label">Unit name</label>
                <input type="text" id="serving_size" name="serving_size" value="{{if eq .Ingredient.ServingType "unit"}}{{.Ingredient.ServingSize}}{{end}}" class="form-control" placeholder="e.g., glass, slice, topping">
            </div>

            <div class="mb-3">
                <label for="calories" class="form-label">Calories</label>
                <input type="number" id="calories" name="calories" value="{{.Ingredient.Calories}}" class="form-control" placeholder="0">
            </div>

            <div class="row g-2 mb-3">
                <div class="col">
                    <label for="carbs" class="form-label">Carbs (g)</label>
                    <input type="number" id="carbs" name="carbs" value="{{printf "%.1f" .Ingredient.Carbs}}" step="0.1" class="form-control">
                </div>
                <div class="col">
                    <label for="protein" class="form-label">Protein (g)</label>
                    <input type="number" id="protein" name="protein" value="{{printf "%.1f" .Ingredient.Protein}}" step="0.1" class="form-control">
                </div>
                <div class="col">
                    <label for="fat" class="form-label">Fat (g)</label>
                    <input type="number" id="fat" name="fat" value="{{printf "%.1f" .Ingredient.Fat}}" step="0.1" class="form-control">
                </div>
            </div>

            <div class="d-flex gap-2 justify-content-end">
                <a href="/ingredients" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-accent">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
function toggleUnitField() {
    var unitField = document.getElementById('unit_name_field');
    var servingSizeInput = document.getElementById('serving_size');
    var isUnit = document.getElementById('serving_type_unit').checked;

    if (isUnit) {
        unitField.style.display = 'block';
    } else {
        unitField.style.display = 'none';
        servingSizeInput.value = '';
    }
}
</script>
{{end}}
